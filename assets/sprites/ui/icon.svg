<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128">
  <!-- Tower base -->
  <rect x="44" y="60" width="40" height="50" fill="#3a6e3a" rx="3"/>
  <!-- Tower top (battlements) -->
  <rect x="40" y="44" width="48" height="24" fill="#2d5a2d" rx="2"/>
  <rect x="40" y="36" width="12" height="16" fill="#2d5a2d"/>
  <rect x="58" y="36" width="12" height="16" fill="#2d5a2d"/>
  <rect x="76" y="36" width="12" height="16" fill="#2d5a2d"/>
  <!-- Arrow/gun barrel -->
  <rect x="64" y="48" width="32" height="8" fill="#1a3a1a" rx="2" transform="rotate(-20 64 52)"/>
  <!-- Stars/score indicators -->
  <circle cx="20" cy="30" r="8" fill="#f0c040"/>
  <circle cx="108" cy="30" r="8" fill="#f0c040"/>
  <!-- Enemy dot -->
  <circle cx="20" cy="90" r="10" fill="#c03020"/>
  <!-- Path arrows -->
  <path d="M35 90 L50 90" stroke="#888" stroke-width="3" stroke-dasharray="4,2"/>
</svg>
